<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <h2>Registration Form</h2>
    <form action="process_form.PHP" method="post" class="form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter full name" >
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter email address" >
        </div>

        <div class="form-row">
            <div class="form-group half-width">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter phone number" >
            </div>
            <div class="form-group half-width">
                <label for="dob">Birth Date</label>
                <input type="date" id="dob" name="dob" >
            </div>
        </div>

        <div class="form-group gender-group">
            <label>Gender</label>
            <div class="radio-options">
                <label><input type="radio" name="gender" value="male" > Male</label>
                <label><input type="radio" name="gender" value="female" > Female</label>
                <label><input type="radio" name="gender" value="prefer-not-to-say" > Prefer not to say</label>
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" name="street1" placeholder="Enter street address" >
            <input type="text" name="street2" placeholder="Enter street address line 2" class="mt-10">
            
            <div class="form-row mt-10">
                <div class="form-group half-width">
                    <select name="country" >
                        <option value="">Country</option>
                        <option value="india">India</option>
                        <option value="usa">USA</option>
                        <option value="uk">UK</option>
                        <option value="canada">Canada</option>
                    </select>
                </div>
                <div class="form-group half-width">
                    <input type="text" name="city" placeholder="Enter your city" >
                </div>
            </div>

            <div class="form-row mt-10">
                <div class="form-group half-width">
                    <input type="text" name="region" placeholder="Enter your region" >
                </div>
                <div class="form-group half-width">
                    <input type="text" name="postal" placeholder="Enter postal code" >
                </div>
            </div>
        </div>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
